name: hs_fashion_store
description: HS Fashion Store Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ───────────────────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.0

  # ── Images ────────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "lib/assets/hs_logo.png"
    background_color: "#F5EFE6"
    theme_color: "#7B4F2E"
  windows:
    generate: true
    image_path: "lib/assets/hs_logo.png"
    icon_size: 48
  image_path: "lib/assets/hs_logo.png"
  background_color: "#F5EFE6"
  adaptive_icon_background: "#F5EFE6"
  adaptive_icon_foreground: "lib/assets/hs_logo.png"
  min_sdk_android: 21

